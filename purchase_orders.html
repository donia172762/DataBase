{% extends "admin_base.html" %}
{% block content %}

<h1>Purchase Orders</h1>

<div class="card">
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Supplier</th>
                <th>Order Date</th>
                <th>Total Cost</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for order in orders %}
            <tr>
                <td>{{ order.po_id }}</td>
                <td>{{ order.supplier_name }}</td>
                <td>{{ order.order_date }}</td>
                <td>{{ order.total_cost }}</td>
                <td>
                    <a href="{{ url_for('purchase_order_details', id=order.po_id) }}">View</a> |
                    <a href="{{ url_for('delete_purchase_order', id=order.po_id) }}" class="delete">Delete</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>


<div class="action-bar">
    <a href="{{ url_for('add_purchase_order') }}" class="btn-primary">
        + Add New Purchase Order
    </a>
</div>

{% endblock %}

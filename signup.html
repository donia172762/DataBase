{% extends "base.html" %}
{% block content %}
<header class="navbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='image/Logo.jpg') }}" alt="LabMart Logo">
        <span>I&D MART</span>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Services</a>
        <a href="/about" class="btn">About</a>
        <a href="{{url_for('login_role')}}" class="btn-outline">Login</a>
        <a href="/register" class="btn">Register</a>
    </nav>
</header>
<div class="auth-bg">
  <div class="auth-blur"></div>

  <a href="{{ url_for('login_role') }}" class="back-btn">← Back</a>

  <div class="auth-card">
    <h2>Create Account</h2>

    <form method="POST">
      <input type="text" name="customer_name" placeholder="Full Name" required>
      <input type="text" name="city" placeholder="City" required>
      <input type="text" name="phone" placeholder="Phone Number" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Create Account</button>
    </form>

    <p class="auth-link">
      Already have an account?
      <a href="{{ url_for('login_role') }}">Login</a>
    </p>
  </div>
</div>

{% endblock %}

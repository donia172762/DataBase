{% extends "base.html" %}
{% block content %}
<header class="navbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='image/Logo.jpg') }}" alt="LabMart Logo">
        <span>I&D MART</span>
    </div>

    <nav>
        <a href="/">Home</a>
        <a href="/shop">Products</a>
        <a href="/about" class="btn">About</a>
        <a href="{{url_for('login_role')}}" class="btn-outline">Login</a>
        <a href="/logout" class="btn">Log Out</a>
    </nav>
</header>
<div class="auth-bg">
  <div class="auth-blur"></div>

  <a href="{{ url_for('login_role') }}" class="back-btn">← Back</a>

  <div class="auth-card">
    <h2>{{ role|capitalize }} Login</h2>

    <form method="POST">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    {% if role == "customer" %}
      <p class="auth-link">
        New customer?
        <a href="{{ url_for('signup') }}">Create account</a>
      </p>
    {% endif %}
  </div>
</div>


{% endblock %}
